<body>
    <h1>Heat Index Checker</h1>

    <form>
        <input type="text" id="temperature" placeholder="Input degree value in Celsius">
        <br>
        <input type="text" id="humidity" placeholder="Input humidity value in percentage">
        <br>
        <button type="button" onclick="heatIndexChecker()">Check Heat Index</button>
    </form>
    
    <script>
        function heatIndexChecker() {
            var temperature = parseFloat(document.getElementById("temperature").value);
            var humidity = parseFloat(document.getElementById("humidity").value);
            var heatIndex = temperature + (0.33 * humidity) - 4;

            if (heatIndex <= 27) {
                alert("Heat Index: " + temperature + "°C, " + humidity + "% - It cools down a bit. Enjoy the day!");
            }
            else if (heatIndex >=32) {
                alert("Heat Index: " + temperature + "°C, " + humidity + "% - Going to be a warm day. Stay cool!");
            }
            else if (heatIndex >=37) {
               alert("Heat Index: " + temperature + "°C, " + humidity + "% - It's gonna be hot today!");
            }
            else if (heatIndex >=41) {
                alert("Heat Index: " + temperature + "°C, " + humidity + "% - Very hot today! careful, you might melt.");

        }

    </script>
