<body>
    <script>

        function heatIndexChecker() {
            var rank = "1st";

            message = "";

            switch(true) {
                case (rank === "1st"):
                    message = "Champion!";
                    break;
                case (rank === "2nd"):
                    message = "Second place!";
                    break;
                case (rank === "3rd"):
                    message = "Third place!";
                    break;
                case (rank === "4th"):
                    message = "Fourth place!";
                    break;
                default:
                    message = "Heat could not be checked.";

            }
            alert(message);
        }
    </script>
